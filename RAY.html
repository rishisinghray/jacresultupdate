:root{--primary:#1e3a5f;--accent:#e8a020;--red:#c0392b;--green:#1a7a3c;--blue:#0d47a1;--bdr:#e5e7eb;--tx2:#4b5563;--tx3:#9ca3af;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Hind',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);position:relative;overflow:hidden;}
body::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");}
.login-wrap{position:relative;z-index:1;width:420px;max-width:95vw;}
.login-card{background:rgba(255,255,255,.97);border-radius:20px;overflow:hidden;box-shadow:0 25px 80px rgba(0,0,0,.5);}
.lc-head{background:linear-gradient(135deg,#1e3a5f,#0d47a1);padding:28px;text-align:center;position:relative;}
.lc-head::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:20px;background:rgba(255,255,255,.97);clip-path:ellipse(60% 100% at 50% 100%);}
.lc-logo{width:72px;height:72px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,.5);box-shadow:0 4px 20px rgba(0,0,0,.3);margin-bottom:12px;}
.lc-head h1{font-family:'Baloo 2',sans-serif;font-size:20px;font-weight:800;color:#fff;margin-bottom:4px;}
.lc-head p{font-size:12px;color:rgba(255,255,255,.65);}
.lc-badge{display:inline-block;background:var(--accent);color:#fff;font-size:10px;padding:2px 10px;border-radius:20px;font-weight:700;margin-top:6px;}
.lc-body{padding:28px 28px 32px;}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;align-items:center;gap:8px;}
.alert.er{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;display:flex;}
.alert.ok{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0;display:flex;}
.fg{margin-bottom:16px;}
.fg label{display:block;font-size:13px;font-weight:600;color:var(--tx2);margin-bottom:6px;}
.fg input{width:100%;padding:12px 14px;border:1.5px solid var(--bdr);border-radius:9px;font-size:14px;outline:none;background:#fafafa;transition:all .2s;}
.fg input:focus{border-color:#0d47a1;background:#fff;box-shadow:0 0 0 3px rgba(13,71,161,.1);}
.pw-wrap{position:relative;}
.pw-wrap input{padding-right:42px;}
.pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--tx3);}
.login-btn{width:100%;padding:13px;background:linear-gradient(135deg,#1e3a5f,#0d47a1);color:#fff;border:none;border-radius:10px;font-family:'Baloo 2',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.3px;}
.login-btn:hover{background:linear-gradient(135deg,#162d4a,#0a3d8f);transform:translateY(-1px);box-shadow:0 6px 20px rgba(13,71,161,.4);}
.login-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none;}
.spin{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.back-link{text-align:center;margin-top:16px;font-size:12.5px;color:var(--tx3);}
.back-link a{color:#0d47a1;font-weight:600;}
.security-note{background:#f9fafb;border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;font-size:11.5px;color:var(--tx3);display:flex;align-items:center;gap:6px;margin-top:14px;}
</style>
